name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias unitx \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass UnitX@2024 \
            -keypass UnitX@2024 \
            -dname "CN=Aman Patel, OU=Dev, O=UnitX, L=Unknown, ST=Unknown, C=IN"

      - name: Write twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.amanpatel.unitx",
            "host": "aman74228.github.io",
            "name": "UnitX — Unit Converter",
            "launcherName": "UnitX",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#6c63ff",
            "navigationColor": "#6c63ff",
            "navigationColorDark": "#6c63ff",
            "navigationDividerColor": "#6c63ff",
            "navigationDividerColorDark": "#6c63ff",
            "backgroundColor": "#ffffff",
            "startUrl": "/claudework/",
            "iconUrl": "https://aman74228.github.io/claudework/icons/icon-512.png",
            "maskableIconUrl": "https://aman74228.github.io/claudework/icons/icon-maskable-512.png",
            "appVersionCode": 1,
            "appVersionName": "1.1",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "unitx"
            },
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": false,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://aman74228.github.io/claudework/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://aman74228.github.io/claudework/",
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "locationDelegation": { "enabled": false },
            "playBilling": { "enabled": false }
          }
          EOF

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.15-6/x64","androidSdkPath":"'$ANDROID_SDK_ROOT'"}' > ~/.bubblewrap/config.json

      - name: Build APK with Bubblewrap
        env:
          STORE_PASSWORD: UnitX@2024
          KEY_PASSWORD: UnitX@2024
        run: |
          bubblewrap build --skipPwaValidation \
            --manifest twa-manifest.json \
            --signingKeyPath ./android.keystore \
            --signingKeyAlias unitx \
            --signingKeyPassword UnitX@2024 \
            --signingStorePassword UnitX@2024

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UnitX-APK
          path: |
            app-release-signed.apk
            app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
