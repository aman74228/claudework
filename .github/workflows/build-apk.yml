name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (use pre-installed Android SDK + Java)
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          SDK_PATH="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_PATH" "$SDK_PATH" > ~/.bubblewrap/config.json
          echo "Config written:"
          cat ~/.bubblewrap/config.json
          echo ""
          echo "Java version:"
          java -version
          echo ""
          echo "Android SDK contents:"
          ls "$SDK_PATH" || echo "SDK path not found, using ANDROID_HOME=$ANDROID_HOME"

      - name: Bubblewrap Init (pipe all interactive answers)
        run: |
          mkdir -p unitx-build && cd unitx-build

          # Answers in order for: bubblewrap init --manifest <url>
          # 1. Domain (auto from manifest)
          # 2. App name (auto)
          # 3. Short name (auto)
          # 4. Application ID
          # 5. Version code
          # 6. Version name
          # 7. Orientation (auto)
          # 8. Theme color (auto)
          # 9. Nav bar color (auto)
          # 10. Nav divider color (auto)
          # 11. Background color (auto)
          # 12. Enable notifications
          # 13. Location delegation
          # 14. Play Billing
          # 15. Additional trusted origins (empty)
          # 16. Site settings shortcut
          # 17. Signing key (new)
          # 18. Key path
          # 19. Key password
          # 20. Key alias
          # 21. Alias password
          # 22. First name
          # 23. Last name
          # 24. Organization (empty)
          # 25. Org unit (empty)
          # 26. Country code
          printf '%s\n' \
            '' \
            '' \
            '' \
            'com.amanpatel.unitx' \
            '1' \
            '1.1' \
            '' \
            '' \
            '' \
            '' \
            '' \
            'n' \
            'n' \
            'n' \
            '' \
            'y' \
            'new' \
            './android.keystore' \
            'UnitX@2024' \
            'unitx' \
            'UnitX@2024' \
            'Aman' \
            'Patel' \
            '' \
            '' \
            'IN' \
          | bubblewrap init --manifest https://aman74228.github.io/claudework/manifest.json

          echo "--- Project files generated ---"
          ls -la

      - name: Build APK
        run: |
          cd unitx-build
          bubblewrap build --skipPwaValidation
          echo "--- Searching for APK ---"
          find . -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnitX-APK
          path: |
            unitx-build/app-release-signed.apk
            unitx-build/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
